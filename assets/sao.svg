<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 480" width="260" height="480">
  <defs>
    <linearGradient id="saoBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a1810"/>
      <stop offset="100%" stop-color="#120a06"/>
    </linearGradient>
    <linearGradient id="saoScreen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a2a10"/>
      <stop offset="60%" stop-color="#140d05"/>
      <stop offset="100%" stop-color="#3a0a10"/>
    </linearGradient>
    <radialGradient id="saoGlow" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#ffd77a" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffd77a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect x="4" y="4" width="252" height="472" rx="18" fill="url(#saoBody)" stroke="#d4a531" stroke-width="4"/>

  <!-- 上部：抽象化した剣モチーフ（版権キャラクターを模写しないシンプルな幾何形状） -->
  <g stroke="#f0c96a" stroke-width="3" fill="#3a1414">
    <path d="M130 18 L138 90 L150 100 L110 100 L122 90 Z"/>
    <rect x="118" y="96" width="24" height="14" fill="#c0392b" stroke="#f0c96a"/>
    <path d="M75 130 L185 130 L165 150 L95 150 Z" fill="#241010"/>
  </g>

  <!-- 液晶画面枠 -->
  <rect x="30" y="160" width="200" height="220" rx="6" fill="url(#saoScreen)" stroke="#d4a531" stroke-width="4"/>
  <rect x="30" y="160" width="200" height="220" rx="6" fill="url(#saoGlow)"/>
  <text x="130" y="270" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="20" font-weight="900" fill="#ffe9b8" opacity="0.85">SAO</text>
  <text x="130" y="298" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="12" fill="#ff5c7a" opacity="0.75">RUSH TYPE</text>

  <!-- 下部：発射装置周り -->
  <rect x="90" y="392" width="80" height="60" rx="10" fill="#1a0e08" stroke="#d4a531" stroke-width="3"/>
  <circle cx="130" cy="422" r="18" fill="#2a1408" stroke="#f0c96a" stroke-width="3"/>

  <rect x="4" y="4" width="252" height="472" rx="18" fill="none" stroke="#ffe0a0" stroke-width="1" opacity="0.4"/>
</svg>
